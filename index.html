<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reverse DAT — Shipper Intelligence Tool</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>↩</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  :root {
    --bg: #0e1117; --surface: #161b22; --surface2: #1c2333; --border: #2a3040;
    --text: #e6edf3; --text2: #9eaab8; --muted: #5e6a78; --accent: #d4451a;
    --heading: 'DM Sans', sans-serif; --body: 'IBM Plex Sans', sans-serif; --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
  input::placeholder, select { color: var(--muted) !important; }
  table tr:hover { background: var(--surface2); }
  code { font-family: var(--mono); }
  a { color: var(--accent); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ── Config ── */
const SAMPLE_LOADS = [
  { origin: "Nucor Steel, Jewett, TX", destination: "Houston, TX", commodity: "Steel coils", equipment: "Flatbed", weight: "44,000 lbs", notes: "Tarping required", rate: "2800", miles: "180" },
  { origin: "Midland, TX", destination: "Odessa, TX", commodity: "Oilfield equipment", equipment: "Step Deck", weight: "38,000 lbs", notes: "Oversized, pilot car needed", rate: "1200", miles: "45" },
  { origin: "Corsicana, TX", destination: "Dallas, TX", commodity: "Mattresses", equipment: "Dry Van", weight: "12,000 lbs", notes: "Multi-stop", rate: "650", miles: "60" },
];
const EMPTY_FORM = { origin: "", destination: "", commodity: "", equipment: "Flatbed", weight: "", notes: "", rate: "", miles: "" };
const EQUIP_TYPES = ["Flatbed", "Step Deck", "Dry Van", "Reefer", "Hotshot", "Power Only", "RGN/Lowboy", "Conestoga"];
const TABS = ["analyze", "log", "intel", "settings"];

/* ── Helpers ── */
function ppm(rate, miles) {
  const r = parseFloat(String(rate).replace(/[^0-9.]/g, ""));
  const m = parseFloat(String(miles).replace(/[^0-9.]/g, ""));
  if (!r || !m) return null;
  return (r / m).toFixed(2);
}
function today() { return new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); }
function extractShipper(text) { const m = text.match(/\*\*([^*]{3,60})\*\*/); return m ? m[1] : "See analysis"; }
function extractConf(text) { const m = text.match(/\b(HIGH|MEDIUM|LOW)\b/i); return m ? m[1].toUpperCase() : "—"; }

/* ── Storage (localStorage) ── */
function loadFromLS(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
function saveToLS(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) { console.error(e); } }
function loadString(key) { return localStorage.getItem(key) || ""; }
function saveString(key, val) { localStorage.setItem(key, val); }

/* ── Knowledge Base (corrections that compound) ── */
const KB_SEEDS = [
  { date:"Apr 11, 2026", location:"Corrigan, TX", commodity:"Lumber", equipment:"Flatbed", shipper:"Roy O. Martin", notes:"Largest single-site lumber mill in the US. Private, family-owned. HQ Alexandria, LA. Often missed by AI in favor of LP/Weyerhaeuser." },
];
function loadKB() { 
  const stored = loadFromLS("rdat_knowledge_base", null);
  if (stored === null) { saveToLS("rdat_knowledge_base", KB_SEEDS); return KB_SEEDS; }
  return stored;
}
function saveKB(kb) { saveToLS("rdat_knowledge_base", kb); }
function buildKBContext(kb, form) {
  if (!kb.length) return "";
  // Find relevant entries: match on city, state, commodity, or equipment
  const origin = (form.origin || "").toLowerCase();
  const commodity = (form.commodity || "").toLowerCase();
  const relevant = kb.filter(k => {
    const loc = (k.location || "").toLowerCase();
    const com = (k.commodity || "").toLowerCase();
    if (loc && origin && origin.includes(loc.split(",")[0].trim())) return true;
    if (com && commodity && commodity.includes(com)) return true;
    return false;
  });
  // Also include all entries as general intelligence
  const allEntries = kb.map(k => `• ${k.location} + ${k.commodity} → ACTUAL SHIPPER: ${k.shipper}${k.notes ? " ("+k.notes+")" : ""}`).join("\n");
  if (!allEntries) return "";
  return `\n\nCRITICAL — VERIFIED SHIPPER INTELLIGENCE (from past corrections):
These are CONFIRMED correct answers from previous searches. If the current load matches any of these locations/commodities, the verified shipper MUST appear as #1 in your results.

${allEntries}\n`;
}

/* ── Sheets Push ── */
async function pushToSheets(webAppUrl, entry) {
  if (!webAppUrl) return { ok: false, error: "No Web App URL configured" };
  try {
    const payload = {
      date: entry.date, origin: entry.origin, destination: entry.destination,
      commodity: entry.commodity, equipment: entry.equipment, weight: entry.weight,
      rate: entry.rate, miles: entry.miles, ppm: entry.ppm || "",
      likelyShipper: entry.likelyShipper || "", confidence: entry.confidence || "", notes: entry.notes,
      timestamp: entry.timestamp || new Date().toISOString(),
    };
    // Include screenshot if present (base64 data URI)
    if (entry.screenshot) {
      payload.screenshot = entry.screenshot;
    }
    const res = await fetch(webAppUrl, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const result = await res.json().catch(() => ({status:"ok"}));
    return { ok: true, imageUrl: result.imageUrl || null };
  } catch (e) { return { ok: false, error: e.message }; }
}

function buildTSV(log) {
  const headers = ["Date","Origin","Destination","Commodity","Equipment","Weight","Rate","Miles","$/mi","Likely Shipper","Confidence","Notes","Screenshot"];
  const rows = log.map(r => [r.date,r.origin,r.destination,r.commodity,r.equipment,r.weight,r.rate,r.miles,r.ppm||"",r.likelyShipper||"",r.confidence||"",r.notes,r.hasScreenshot?"Yes — see Drive folder":""]);
  return [headers,...rows].map(row => row.map(c => String(c||"").replace(/\t/g," ")).join("\t")).join("\n");
}

/* ── Styles ── */
const inputBase = { background:"var(--surface2)", border:"1px solid var(--border)", borderRadius:6, padding:"10px 12px", fontSize:14, color:"var(--text)", fontFamily:"var(--body)", outline:"none", width:"100%", boxSizing:"border-box" };
const aBtn = { background:"var(--surface2)", border:"1px solid var(--border)", borderRadius:5, padding:"6px 14px", fontSize:12, color:"var(--text2)", cursor:"pointer", fontFamily:"var(--mono)" };
const tdStyle = { padding:"10px 6px", verticalAlign:"top" };

/* ── Components ── */
function Field({ label, value, onChange, placeholder, select, options, full }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:4, ...(full?{gridColumn:"1 / -1"}:{}) }}>
      <label style={{ fontSize:11, color:"var(--muted)", fontFamily:"var(--mono)", textTransform:"uppercase", letterSpacing:1 }}>{label}</label>
      {select ? (
        <select value={value} onChange={onChange} style={{...inputBase, cursor:"pointer"}}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>
      ) : (
        <input value={value} onChange={onChange} placeholder={placeholder} style={inputBase} />
      )}
    </div>
  );
}

function StatusBadge({ connected, syncing, lastError }) {
  if (syncing) return <span style={{fontSize:11,fontFamily:"var(--mono)",color:"#d29922",display:"flex",alignItems:"center",gap:4}}><span style={{animation:"pulse 1s infinite"}}>●</span> Syncing...</span>;
  if (lastError) return <span style={{fontSize:11,fontFamily:"var(--mono)",color:"#f85149",display:"flex",alignItems:"center",gap:4}}>● Sync error</span>;
  if (connected) return <span style={{fontSize:11,fontFamily:"var(--mono)",color:"#3fb950",display:"flex",alignItems:"center",gap:4}}>● Live to Sheets</span>;
  return <span style={{fontSize:11,fontFamily:"var(--mono)",color:"var(--muted)",display:"flex",alignItems:"center",gap:4}}>○ Not connected</span>;
}

function LoadForm({ onAnalyze, loading, apiKey }) {
  const [form, setForm] = useState({...EMPTY_FORM});
  const [parsing, setParsing] = useState(false);
  const [parseError, setParseError] = useState(null);
  const [preview, setPreview] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = React.useRef(null);
  const set = k => e => setForm(f => ({...f, [k]: e.target.value}));

  const handleFile = async (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    if (!apiKey) { setParseError("Add your API key in ⚙ Settings first."); return; }
    setParseError(null);

    // Preview
    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64Full = e.target.result;
      const base64Data = base64Full.split(",")[1];
      const mediaType = file.type;
      setPreview(base64Full);
      setParsing(true);

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 800,
            messages: [{
              role: "user",
              content: [
                { type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } },
                { type: "text", text: `You are parsing a screenshot from a freight load board (DAT, Truckstop, 123Loadboard, etc).

Extract ALL load details visible in the screenshot. Return ONLY a JSON object with these fields (use empty string if not found):

{
  "origin": "city, state or full address",
  "destination": "city, state or full address", 
  "commodity": "what is being shipped",
  "equipment": "must be one of: Flatbed, Step Deck, Dry Van, Reefer, Hotshot, Power Only, RGN/Lowboy, Conestoga",
  "weight": "weight with units",
  "rate": "dollar amount only, no $ sign",
  "miles": "number only",
  "notes": "any other details: dimensions, hazmat, tarping, stops, dates, reference numbers, special requirements"
}

Parse aggressively — pull every detail you can see. For equipment, map common abbreviations: F/SD = Flatbed/Step Deck, V = Van, R = Reefer. If you see multiple loads, parse the most prominent/selected one. Return ONLY the JSON, no other text.` }
              ]
            }]
          }),
        });
        if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.error?.message || "HTTP " + res.status); }
        const data = await res.json();
        const text = data.content?.map(c => c.text || "").join("") || "";
        
        // Parse JSON from response (handle markdown fences)
        const clean = text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
        const parsed = JSON.parse(clean);
        
        setForm(f => ({
          ...f,
          origin: parsed.origin || f.origin,
          destination: parsed.destination || f.destination,
          commodity: parsed.commodity || f.commodity,
          equipment: EQUIP_TYPES.includes(parsed.equipment) ? parsed.equipment : f.equipment,
          weight: parsed.weight || f.weight,
          rate: parsed.rate || f.rate,
          miles: parsed.miles || f.miles,
          notes: parsed.notes || f.notes,
        }));
      } catch (e) {
        setParseError("Parse failed: " + e.message);
      } finally {
        setParsing(false);
      }
    };
    reader.readAsDataURL(file);
  };

  const onDrop = e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); };
  const onPaste = e => { const items = e.clipboardData?.items; if(items) for(let i of items) if(i.type.startsWith("image/")) handleFile(i.getAsFile()); };

  React.useEffect(() => { document.addEventListener("paste", onPaste); return () => document.removeEventListener("paste", onPaste); }, [apiKey]);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Screenshot Upload Zone */}
      <div
        onDragOver={e=>{e.preventDefault();setDragOver(true)}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={onDrop}
        onClick={()=>fileRef.current?.click()}
        style={{
          border:`2px dashed ${dragOver?"var(--accent)":"var(--border)"}`,
          borderRadius:10, padding:preview?"12px":"28px 20px", textAlign:"center", cursor:"pointer",
          background:dragOver?"rgba(212,69,26,0.08)":"var(--surface)",
          transition:"all 0.2s",
        }}
      >
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])} />
        {parsing ? (
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:8}}>
            <span style={{animation:"pulse 1s infinite",fontSize:20}}>🔍</span>
            <span style={{fontSize:14,fontWeight:700,color:"var(--accent)",fontFamily:"var(--heading)"}}>Parsing screenshot...</span>
          </div>
        ) : preview ? (
          <div style={{display:"flex",gap:14,alignItems:"center"}}>
            <img src={preview} style={{maxHeight:80,maxWidth:200,borderRadius:6,border:"1px solid var(--border)"}} />
            <div style={{textAlign:"left"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#3fb950",fontFamily:"var(--heading)"}}>✓ Screenshot parsed</div>
              <div style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)",marginTop:2}}>Fields auto-filled below. Drop another to replace.</div>
            </div>
          </div>
        ) : (
          <div>
            <div style={{fontSize:28,marginBottom:6}}>📸</div>
            <div style={{fontSize:14,fontWeight:700,color:"var(--text)",fontFamily:"var(--heading)"}}>Drop a DAT screenshot here</div>
            <div style={{fontSize:12,color:"var(--muted)",fontFamily:"var(--mono)",marginTop:4}}>or click to upload · also supports Ctrl+V paste</div>
          </div>
        )}
      </div>
      {parseError && <div style={{background:"#2d1518",border:"1px solid #5c2328",borderRadius:6,padding:"8px 12px",fontSize:12,color:"#f0868d",fontFamily:"var(--mono)"}}>{parseError}</div>}

      {/* Quick Fill */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)",textTransform:"uppercase",letterSpacing:1,alignSelf:"center"}}>Quick fill:</span>
        {SAMPLE_LOADS.map((s,i) => (
          <button key={i} onClick={()=>setForm({...EMPTY_FORM,...s})} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:4,padding:"4px 10px",fontSize:11,color:"var(--text2)",cursor:"pointer",fontFamily:"var(--mono)"}}>{s.commodity}</button>
        ))}
      </div>

      {/* Form Fields */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Field label="Origin (City/Zip)" value={form.origin} onChange={set("origin")} placeholder="e.g. Jewett, TX 75846" />
        <Field label="Destination" value={form.destination} onChange={set("destination")} placeholder="e.g. Houston, TX" />
        <Field label="Commodity" value={form.commodity} onChange={set("commodity")} placeholder="e.g. Steel coils, lumber" />
        <Field label="Equipment Type" value={form.equipment} onChange={set("equipment")} select options={EQUIP_TYPES} />
        <Field label="Weight" value={form.weight} onChange={set("weight")} placeholder="e.g. 44,000 lbs" />
        <Field label="Rate ($)" value={form.rate} onChange={set("rate")} placeholder="e.g. 2800" />
        <Field label="Miles" value={form.miles} onChange={set("miles")} placeholder="e.g. 180" />
        <div style={{display:"flex",alignItems:"flex-end"}}>
          {form.rate && form.miles && ppm(form.rate,form.miles) && (
            <div style={{background:"var(--accent)",borderRadius:6,padding:"10px 14px",fontFamily:"var(--mono)",fontSize:15,fontWeight:700,color:"#fff",width:"100%",textAlign:"center"}}>${ppm(form.rate,form.miles)}/mi</div>
          )}
        </div>
      </div>
      <Field label="Additional Notes" value={form.notes} onChange={set("notes")} placeholder="Tarping, oversized, hazmat, multi-stop, recurring, etc." full />
      <button onClick={()=>onAnalyze(form, preview)} disabled={loading||(!form.origin&&!form.commodity)} style={{background:loading?"var(--surface2)":"var(--accent)",color:loading?"var(--muted)":"#fff",border:"none",borderRadius:6,padding:"14px 24px",fontSize:15,fontWeight:700,cursor:loading?"wait":"pointer",fontFamily:"var(--heading)",letterSpacing:0.5,transition:"all 0.2s",marginTop:4}}>
        {loading ? "⏳ Analyzing load..." : "🔍 Reverse Engineer Shipper"}
      </button>
    </div>
  );
}

function ResultCard({ result, lastForm, onCorrect }) {
  const [showCorrect, setShowCorrect] = useState(false);
  const [corrShipper, setCorrShipper] = useState("");
  const [corrNotes, setCorrNotes] = useState("");
  if (!result) return null;
  const fmt = t => t
    .replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text);font-weight:700">$1</strong>')
    .replace(/^### (.+)$/gm, '<div style="font-size:15px;font-weight:800;color:var(--accent);font-family:var(--heading);margin:18px 0 6px;text-transform:uppercase;letter-spacing:0.5px">$1</div>')
    .replace(/^## (.+)$/gm, '<div style="font-size:16px;font-weight:800;color:var(--text);font-family:var(--heading);margin:20px 0 8px">$1</div>')
    .replace(/^- (.+)$/gm, '<div style="padding-left:16px;margin:3px 0">• $1</div>');
  const submitCorrection = () => {
    if (!corrShipper.trim()) return;
    onCorrect({
      date: today(),
      location: lastForm?.origin || "",
      commodity: lastForm?.commodity || "",
      equipment: lastForm?.equipment || "",
      shipper: corrShipper.trim(),
      notes: corrNotes.trim(),
    });
    setShowCorrect(false); setCorrShipper(""); setCorrNotes("");
  };
  return (
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:24,marginTop:20,animation:"fadeIn 0.4s ease"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <div style={{width:36,height:36,borderRadius:8,background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏭</div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)",textTransform:"uppercase",letterSpacing:1}}>Analysis Complete</div>
          <div style={{fontSize:16,fontWeight:700,color:"var(--text)",fontFamily:"var(--heading)"}}>Likely Shipper Identification</div>
        </div>
        {lastForm && onCorrect && (
          <button onClick={()=>setShowCorrect(!showCorrect)} style={{background:showCorrect?"var(--accent)":"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"6px 14px",fontSize:11,color:showCorrect?"#fff":"var(--text2)",cursor:"pointer",fontFamily:"var(--mono)",fontWeight:700}}>
            {showCorrect ? "✕ Cancel" : "⚡ Wrong? Correct it"}
          </button>
        )}
      </div>

      {showCorrect && (
        <div style={{background:"var(--bg)",border:"1px solid var(--accent)",borderRadius:8,padding:16,marginBottom:16,animation:"fadeIn 0.3s ease"}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--accent)",fontFamily:"var(--heading)",marginBottom:10}}>🧠 Add to Knowledge Base</div>
          <div style={{fontSize:12,color:"var(--text2)",marginBottom:12,lineHeight:1.5}}>
            This correction trains the tool. Next time a load matches <strong>{lastForm?.origin}</strong> + <strong>{lastForm?.commodity}</strong>, the correct shipper will be prioritized.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div>
              <label style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--mono)",textTransform:"uppercase"}}>Correct Shipper</label>
              <input value={corrShipper} onChange={e=>setCorrShipper(e.target.value)} placeholder="e.g. Roy O. Martin" style={{...inputBase,fontSize:13,marginTop:4}} />
            </div>
            <div>
              <label style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--mono)",textTransform:"uppercase"}}>Notes (optional)</label>
              <input value={corrNotes} onChange={e=>setCorrNotes(e.target.value)} placeholder="e.g. Largest single-site mill in US" style={{...inputBase,fontSize:13,marginTop:4}} />
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={submitCorrection} disabled={!corrShipper.trim()} style={{background:"#238636",color:"#fff",border:"none",borderRadius:6,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"var(--heading)"}}>✓ Save Correction</button>
            <span style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)"}}>Origin: {lastForm?.origin} · Commodity: {lastForm?.commodity}</span>
          </div>
        </div>
      )}

      <div style={{whiteSpace:"pre-wrap",fontSize:14,lineHeight:1.7,color:"var(--text2)",fontFamily:"var(--body)"}} dangerouslySetInnerHTML={{__html:fmt(result)}} />
    </div>
  );
}

function IntelTab({ kb, onDelete, onAdd }) {
  const [addMode, setAddMode] = useState(false);
  const [loc, setLoc] = useState("");
  const [com, setCom] = useState("");
  const [ship, setShip] = useState("");
  const [notes, setNotes] = useState("");

  const submit = () => {
    if (!loc.trim() || !ship.trim()) return;
    onAdd({ date:today(), location:loc.trim(), commodity:com.trim(), equipment:"", shipper:ship.trim(), notes:notes.trim() });
    setLoc(""); setCom(""); setShip(""); setNotes(""); setAddMode(false);
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontSize:17,fontWeight:800,fontFamily:"var(--heading)"}}>🧠 Shipper Intelligence Base</div>
          <div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>Verified corrections that train the AI. Each entry compounds accuracy over time.</div>
        </div>
        <button onClick={()=>setAddMode(!addMode)} style={{...aBtn,background:addMode?"var(--accent)":"var(--surface2)",color:addMode?"#fff":"var(--text2)"}}>{addMode?"Cancel":"+ Add Entry"}</button>
      </div>

      {addMode && (

const APPS_SCRIPT_CODE = `function doPost(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var data = JSON.parse(e.postData.contents);
  var imageUrl = "";

  // Save screenshot to Google Drive if provided
  if (data.screenshot) {
    try {
      // Get or create root folder
      var rootFolders = DriveApp.getFoldersByName("Reverse DAT Screenshots");
      var root = rootFolders.hasNext() 
        ? rootFolders.next() 
        : DriveApp.createFolder("Reverse DAT Screenshots");

      // Build subfolder name: timestamp_commodity_origin-to-dest
      var ts = data.timestamp 
        ? data.timestamp.replace(/[:.]/g, "-").substring(0, 19)
        : Utilities.formatDate(new Date(), "America/Chicago", "yyyy-MM-dd_HH-mm-ss");
      var commodity = (data.commodity || "unknown").replace(/[^a-zA-Z0-9 ]/g, "").substring(0, 30).trim();
      var origin = (data.origin || "unknown").split(",")[0].trim().substring(0, 20);
      var dest = (data.destination || "unknown").split(",")[0].trim().substring(0, 20);
      var folderName = ts + "_" + commodity + "_" + origin + "-to-" + dest;
      folderName = folderName.replace(/\\s+/g, "-");

      var subFolder = root.createFolder(folderName);

      // Decode base64 image and save
      var base64 = data.screenshot.split(",");
      var mimeType = "image/png";
      var imgData = base64[base64.length - 1];
      if (base64.length > 1 && base64[0].indexOf("jpeg") > -1) mimeType = "image/jpeg";
      if (base64.length > 1 && base64[0].indexOf("webp") > -1) mimeType = "image/webp";
      var ext = mimeType === "image/jpeg" ? ".jpg" : mimeType === "image/webp" ? ".webp" : ".png";

      var blob = Utilities.newBlob(
        Utilities.base64Decode(imgData), 
        mimeType, 
        "DAT_Screenshot_" + ts + ext
      );
      var file = subFolder.createFile(blob);
      file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
      imageUrl = file.getUrl();
    } catch (err) {
      imageUrl = "Error: " + err.message;
    }
  }

  // Append row with screenshot link
  sheet.appendRow([
    data.date, data.origin, data.destination, data.commodity,
    data.equipment, data.weight, data.rate, data.miles,
    data.ppm, data.likelyShipper, data.confidence, data.notes,
    imageUrl
  ]);

  return ContentService
    .createTextOutput(JSON.stringify({ status: "ok", imageUrl: imageUrl }))
    .setMimeType(ContentService.MimeType.JSON);
}

function doGet(e) {
  return ContentService
    .createTextOutput("Reverse DAT endpoint active")
    .setMimeType(ContentService.MimeType.TEXT);
}`;

/* ── Main App ── */
function App() {
  const [tab, setTab] = useState("analyze");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [log, setLog] = useState([]);
  const [copied, setCopied] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [webAppUrl, setWebAppUrl] = useState("");
  const [syncing, setSyncing] = useState(false);
  const [syncError, setSyncError] = useState(null);
  const [testResult, setTestResult] = useState(null);
  const [testing, setTesting] = useState(false);
  const [sheetsPush, setSheetsPush] = useState(null);
  const [kb, setKB] = useState([]);
  const [lastForm, setLastForm] = useState(null);

  useEffect(() => {
    setLog(loadFromLS("rdat_log", []));
    setApiKey(loadString("rdat_apikey") || "");
    setWebAppUrl(loadString("rdat_webapp_url") || "");
    setKB(loadKB());
  }, []);

  const persistLog = useCallback(nl => { setLog(nl); saveToLS("rdat_log", nl); }, []);
  const persistKB = useCallback(newKB => { setKB(newKB); saveKB(newKB); }, []);
  const addCorrection = (correction) => { const newKB = [correction, ...kb]; persistKB(newKB); };

  const saveApiKey = () => { saveString("rdat_apikey", apiKey); };

  const testConnection = async (urlOverride) => {
    const url = urlOverride || webAppUrl;
    setTesting(true); setTestResult(null);
    const res = await pushToSheets(url, {
      date:today(), timestamp:new Date().toISOString(), origin:"TEST", destination:"TEST", commodity:"Connection Test",
      equipment:"—", weight:"—", rate:"—", miles:"—", ppm:"—",
      likelyShipper:"Test Row — Delete Me", confidence:"—", notes:"Sent from Reverse DAT"
    });
    setTestResult(res); setTesting(false);
  };

  const analyze = async (form, screenshot) => {
    if (!apiKey) { setError("Add your Anthropic API key in the ⚙ Settings tab first."); return; }
    setLoading(true); setError(null); setResult(null); setSyncError(null);
    const searchTimestamp = new Date().toISOString();

    // Build knowledge base context from past corrections
    const kbContext = buildKBContext(kb, form);

    const prompt = `You are a senior freight broker intelligence analyst specializing in identifying the ACTUAL shipper behind load board postings.

CRITICAL RULES:
1. PRIORITIZE the EXACT ORIGIN CITY above all else. The shipper almost always has a facility, mill, plant, warehouse, or yard AT or very near the origin.
2. DO NOT default to the biggest publicly traded company in the commodity space. Private, family-owned, and regional operators are often the actual shipper. A small private mill in the exact city beats a Fortune 500 lumber company 200 miles away.
3. USE the web search results to find what companies actually operate facilities at the origin location. Search for "[origin city] + [commodity] + mill/plant/facility/manufacturer/warehouse".
4. Pay close attention to the COMMENTS/NOTES field — it may contain shipper codes, dimension specs, or reference numbers that identify the shipper.
5. Consider the BROKER/CARRIER posting the load — their location and patterns can indicate which shipper they typically serve.
${kbContext}
LOAD DETAILS:
- Origin: ${form.origin || "Not specified"}
- Destination: ${form.destination || "Not specified"}
- Commodity: ${form.commodity || "Not specified"}
- Equipment: ${form.equipment || "Not specified"}
- Weight: ${form.weight || "Not specified"}
- Rate: $${form.rate || "Not specified"}
- Miles: ${form.miles || "Not specified"}
- Notes: ${form.notes || "None"}

REQUIRED RESEARCH: Before answering, search the web for:
1. "${(form.origin||"").split(",")[0].trim()} ${form.commodity || ""} facility plant mill"
2. "manufacturers ${form.commodity || ""} ${(form.origin||"").split(",")[0].trim()} Texas" (or relevant state)
This is essential to find private/regional operators that you might not know from training data.

Provide your analysis in this structure:

## Most Likely Shipper(s)
List the top 1-3 most likely shippers. For EACH:
- Company name (bold)
- Exact facility location (city, state)  
- Ownership type: publicly traded, private, family-owned, cooperative, etc.
- WHY this is likely the shipper (facility proximity to origin, commodity match, equipment match)
- Phone number or website if found in search results

### Confidence Level
Rate: HIGH / MEDIUM / LOW and explain.

### Industry Context
Brief note on this freight lane — common? Seasonal? What typically drives this freight?

### Prospecting Intel
- Who to call (title: logistics manager, traffic dept, shipping coordinator, etc.)
- Opening line when you call (reference their specific product and lane)
- Any known TMS, 3PL relationships, or broker preferences
- Typical margin expectations for this commodity/lane

### Red Flags / Watch-Outs
Double-brokering risk, capacity crunches, detention at this facility, seasonal patterns, etc.

Remember: the correct answer is usually the company with a FACILITY AT THE ORIGIN CITY, not the biggest brand name in the commodity space.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{ role: "user", content: prompt }]
        }),
      });
      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP ${response.status}`);
      }
      const data = await response.json();
      // Extract text from all content blocks (web search returns mixed types)
      const text = data.content?.filter(c => c.type === "text").map(c => c.text || "").join("\n") || "No response received.";
      setResult(text);
      setLastForm(form); // Store for correction feature
      const entry = {
        date:today(), timestamp:searchTimestamp, origin:form.origin, destination:form.destination, commodity:form.commodity,
        equipment:form.equipment, weight:form.weight, rate:form.rate, miles:form.miles,
        ppm:ppm(form.rate,form.miles), likelyShipper:extractShipper(text), confidence:extractConf(text),
        notes:form.notes, fullResult:text, hasScreenshot:!!screenshot,
      };
      const newLog = [entry, ...log];
      persistLog(newLog);
      if (webAppUrl) {
        setSyncing(true);
        // Send screenshot with push but don't store in localStorage (too large)
        const pushEntry = screenshot ? {...entry, screenshot} : entry;
        const res = await pushToSheets(webAppUrl, pushEntry);
        setSyncing(false);
        if (!res.ok) setSyncError(res.error);
        else { setSheetsPush("✓ Pushed to Sheets"); setTimeout(()=>setSheetsPush(null), 3000); }
      }
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const pushAllToSheets = async () => {
    if (!webAppUrl || !log.length) return;
    setSyncing(true);
    let ok=0, fail=0;
    for (const entry of [...log].reverse()) {
      const res = await pushToSheets(webAppUrl, entry);
      if (res.ok) ok++; else fail++;
    }
    setSyncing(false);
    setSheetsPush(`✓ Pushed ${ok} rows${fail?`, ${fail} failed`:""}`);
    setTimeout(()=>setSheetsPush(null), 4000);
  };

  const copyForSheets = () => {
    navigator.clipboard.writeText(buildTSV(log)).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500)});
  };

  return (
    <div style={{maxWidth:800,margin:"0 auto",padding:"32px 20px"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
        <div style={{background:"var(--accent)",width:40,height:40,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:"#fff",fontFamily:"var(--heading)"}}>↩</div>
        <div style={{flex:1}}>
          <h1 style={{margin:0,fontSize:22,fontWeight:800,fontFamily:"var(--heading)",letterSpacing:-0.5}}>Reverse DAT</h1>
          <div style={{fontSize:12,color:"var(--muted)",fontFamily:"var(--mono)"}}>WEB SEARCH · KNOWLEDGE BASE · PRICE TRACKING · SHEETS SYNC</div>
        </div>
        <StatusBadge connected={!!webAppUrl} syncing={syncing} lastError={syncError} />
      </div>
      {!apiKey && (
        <div style={{background:"#2d1518",border:"1px solid #5c2328",borderRadius:8,padding:"10px 14px",margin:"12px 0",fontSize:13,color:"#f0868d",fontFamily:"var(--mono)"}}>
          ⚠ Add your API key in ⚙ Settings to start analyzing loads.
        </div>
      )}
      <p style={{margin:"10px 0 20px",fontSize:13,color:"var(--text2)",lineHeight:1.5}}>
        Drop a DAT screenshot or paste load details → AI parses & identifies the likely shipper → auto-logs pricing → screenshots saved to Google Drive → row pushed to Sheets.
      </p>

      {/* Tabs */}
      <div style={{display:"flex",gap:0,marginBottom:20,borderBottom:"2px solid var(--border)"}}>
        {TABS.map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{
            background:"none",border:"none",borderBottom:tab===t?"2px solid var(--accent)":"2px solid transparent",
            padding:"10px 20px",fontSize:13,fontWeight:700,fontFamily:"var(--heading)",
            color:tab===t?"var(--text)":"var(--muted)",cursor:"pointer",textTransform:"uppercase",letterSpacing:0.5,marginBottom:-2,
          }}>
            {t==="analyze"?"🔍 Analyze":t==="log"?`📊 Log (${log.length})`:t==="intel"?`🧠 Intel (${kb.length})`:"⚙ Settings"}
          </button>
        ))}
      </div>

      {tab==="analyze" && (
        <>
          <LoadForm onAnalyze={analyze} loading={loading} apiKey={apiKey} />
          {error && <div style={{background:"#2d1518",border:"1px solid #5c2328",borderRadius:8,padding:14,marginTop:16,fontSize:13,color:"#f0868d",fontFamily:"var(--mono)"}}>{error}</div>}
          <ResultCard result={result} lastForm={lastForm} onCorrect={addCorrection} />
        </>
      )}
      {tab==="log" && (
        <LogTable log={log} webAppUrl={webAppUrl} onClear={()=>{if(confirm("Clear all?"))persistLog([])}} onCopySheets={copyForSheets} onDelete={i=>persistLog(log.filter((_,j)=>j!==i))} onViewResult={r=>{setResult(r);setTab("analyze")}} onPushAll={pushAllToSheets} />
      )}
      {tab==="intel" && (
        <IntelTab kb={kb} onDelete={i=>persistKB(kb.filter((_,j)=>j!==i))} onAdd={addCorrection} />
      )}
      {tab==="settings" && (
        <SettingsTab apiKey={apiKey} setApiKey={setApiKey} webAppUrl={webAppUrl} setWebAppUrl={setWebAppUrl} onSaveKey={saveApiKey} onSaveUrl={url=>{setWebAppUrl(url);saveString("rdat_webapp_url",url)}} testResult={testResult} onTest={testConnection} testing={testing} />
      )}

      {(copied||sheetsPush) && (
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#3fb950",color:"#0e1117",padding:"10px 20px",borderRadius:8,fontWeight:700,fontFamily:"var(--heading)",fontSize:13,animation:"fadeIn 0.3s ease",zIndex:999}}>
          {copied?"✓ Copied — paste into Google Sheets":sheetsPush}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
